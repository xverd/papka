<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/css/bootstrap.min.css"
    integrity="sha384-giJF6kkoqNQ00vy+HMDP7azOuL0xtbfIcaT9wjKHr8RbDVddVHyTfAAsrekwKmP1"
    crossorigin="anonymous">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/style.css') }}" />
    <title>Отбор астронавтов</title>
  </head>
  <body>
    <div class="container mt-5">
      <h1 class="text-center">Загрузка фотографии</h1>
      <h2 class="text-center">для участия в миссии</h2>
      <form class="login_form" method="post" enctype="multipart/form-data">
          <label for="photo">Приложите фотографию</label>
          <input type="file" class="form-control-file" id="photo" name="file"><br><br>
          <div class="photo-container">
              {% if image %}
              <img src="{{ url_for('static', filename='img/' + image) }}" alt="Ваша фотография">
              {% else %}
              <div class="photo-placeholder"></div>
              {% endif %}
          </div>
          <button type="submit" class="btn btn-primary">Отправить</button>
      </form>
    </div>
  </body>
</html>
